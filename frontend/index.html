<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading DB Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #4f8ef7;
      --accent2: #7c5cfc;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --text: #e2e8f0;
      --muted: #7c87a6;
      --font: 'Inter', system-ui, sans-serif;
    }

    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 56px;
    }
    header h1 { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.3px; }
    header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }
    header .status-txt { font-size: 12px; color: var(--muted); }
    header .refresh-btn {
      margin-left: auto;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    header .refresh-btn:hover { background: var(--border); }

    .stats-bar {
      display: flex;
      gap: 12px;
      padding: 16px 24px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 20px;
      min-width: 140px;
      flex: 1;
    }
    .stat-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; }
    .stat-card .value { font-size: 26px; font-weight: 700; margin-top: 4px; }
    .stat-card .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      background: var(--surface);
    }
    .tab {
      padding: 12px 20px;
      font-size: 14px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      transition: color 0.15s, border-color 0.15s;
      user-select: none;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .panel { display: none; padding: 20px 24px; }
    .panel.active { display: block; }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      align-items: center;
      flex-wrap: wrap;
    }
    .toolbar input, .toolbar select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 12px;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }
    .toolbar input:focus, .toolbar select:focus { border-color: var(--accent); }
    .toolbar label { font-size: 13px; color: var(--muted); }
    .toolbar .limit-wrap { display: flex; align-items: center; gap: 6px; margin-left: auto; }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      background: var(--surface2);
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 10px 14px; vertical-align: top; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .badge-buy   { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-sell  { background: rgba(239,68,68,0.15);  color: var(--red); }
    .badge-open  { background: rgba(79,142,247,0.15); color: var(--accent); }
    .badge-closed { background: rgba(124,135,166,0.15); color: var(--muted); }
    .badge-yes   { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-no    { background: rgba(239,68,68,0.15);  color: var(--red); }
    .badge-disabled { background: rgba(124,135,166,0.12); color: var(--muted); }

    .pnl-pos { color: var(--green); font-weight: 600; }
    .pnl-neg { color: var(--red);   font-weight: 600; }
    .pnl-zero{ color: var(--muted); }

    .conf-bar-wrap { display: flex; align-items: center; gap: 8px; }
    .conf-bar { height: 4px; border-radius: 2px; background: var(--border); flex: 1; min-width: 60px; }
    .conf-bar-fill { height: 100%; border-radius: 2px; background: var(--accent2); }

    .mono { font-family: 'Fira Mono', 'Consolas', monospace; font-size: 12px; }
    .muted { color: var(--muted); }
    .json-cell { max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
    .json-cell:hover { color: var(--accent); }

    .empty-state {
      text-align: center;
      padding: 48px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 32px; margin-bottom: 10px; }

    .loader {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 14px;
    }

    /* JSON modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      max-width: 760px;
      width: 94%;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
    }
    .modal h3 { font-size: 15px; margin-bottom: 12px; color: var(--accent); }
    .modal pre {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      font-size: 12px;
      overflow-y: auto;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      font-family: 'Fira Mono', monospace;
      color: var(--text);
    }
    .modal-close {
      margin-top: 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    /* Lifecycle drawer */
    .drawer-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 200;
    }
    .drawer-overlay.open { display: block; }
    .drawer {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: min(600px, 100vw);
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.22s ease;
      z-index: 201;
    }
    .drawer-overlay.open .drawer { transform: translateX(0); }

    .drawer-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .drawer-header h2 { font-size: 15px; font-weight: 700; flex: 1; }
    .drawer-close {
      background: none; border: none; color: var(--muted);
      font-size: 20px; cursor: pointer; line-height: 1;
    }
    .drawer-close:hover { color: var(--text); }

    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .dl-section { display: flex; flex-direction: column; gap: 8px; }
    .dl-section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      font-weight: 600;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .dl-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 16px;
    }
    .dl-item { display: flex; flex-direction: column; gap: 2px; }
    .dl-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
    .dl-value { font-size: 13px; }

    .reason-textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 10px 12px;
      font-size: 13px;
      font-family: var(--font);
      resize: vertical;
      min-height: 90px;
      outline: none;
    }
    .reason-textarea:focus { border-color: var(--accent); }
    .reason-save-btn {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 7px 18px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
    }
    .reason-save-btn:hover { opacity: 0.88; }
    .reason-saved-msg { font-size: 12px; color: var(--green); display: none; }

    /* Audit timeline */
    .timeline { display: flex; flex-direction: column; gap: 0; }
    .tl-item {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .tl-item:last-child { border-bottom: none; }
    .tl-dot-wrap { display: flex; flex-direction: column; align-items: center; padding-top: 3px; }
    .tl-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .tl-line { flex: 1; width: 1px; background: var(--border); margin-top: 4px; }
    .tl-content { flex: 1; min-width: 0; }
    .tl-event { font-size: 12px; font-weight: 600; color: var(--accent); }
    .tl-time  { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .tl-payload {
      margin-top: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 11px;
      font-family: 'Fira Mono', monospace;
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--text);
      max-height: 160px;
      overflow-y: auto;
    }

    .view-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--accent);
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
    }
    .view-btn:hover { background: var(--border); }

    @media (max-width: 640px) {
      .stats-bar { padding: 12px; gap: 8px; }
      .panel { padding: 12px; }
      .tabs { padding: 0 12px; }
      .dl-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="dot" id="statusDot"></div>
  <h1>Trading DB Viewer</h1>
  <span class="status-txt" id="statusTxt">Connecting…</span>
  <button class="refresh-btn" onclick="refreshAll()">&#8635; Refresh</button>
</header>

<div class="stats-bar" id="statsBar">
  <div class="stat-card"><div class="label">Signals</div><div class="value" id="s-total">—</div><div class="sub">total</div></div>
  <div class="stat-card"><div class="label">Trades</div><div class="value" id="t-total">—</div><div class="sub">total</div></div>
  <div class="stat-card"><div class="label">Open Trades</div><div class="value" id="t-open">—</div><div class="sub">active</div></div>
  <div class="stat-card"><div class="label">Realized PnL</div><div class="value" id="t-pnl">—</div><div class="sub">closed trades</div></div>
  <div class="stat-card"><div class="label">Audit Events</div><div class="value" id="a-total">—</div><div class="sub">total</div></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('signals')">Signals</div>
  <div class="tab" onclick="switchTab('trades')">Trades</div>
  <div class="tab" onclick="switchTab('audit')">Audit Log</div>
</div>

<!-- SIGNALS -->
<div class="panel active" id="panel-signals">
  <div class="toolbar">
    <input id="sig-search" type="text" placeholder="Filter symbol / strategy…" oninput="renderSignals()" />
    <select id="sig-side" onchange="renderSignals()">
      <option value="">All sides</option>
      <option value="BUY">BUY</option>
      <option value="SELL">SELL</option>
    </select>
    <select id="sig-ai" onchange="renderSignals()">
      <option value="">All AI</option>
      <option value="1">Approved</option>
      <option value="0">Rejected</option>
    </select>
    <div class="limit-wrap">
      <label>Limit</label>
      <select id="sig-limit" onchange="loadSignals()">
        <option value="50">50</option><option value="100">100</option><option value="200">200</option>
      </select>
    </div>
  </div>
  <div id="signals-table"><div class="loader">Loading…</div></div>
</div>

<!-- TRADES -->
<div class="panel" id="panel-trades">
  <div class="toolbar">
    <input id="tr-search" type="text" placeholder="Filter symbol / strategy…" oninput="renderTrades()" />
    <select id="tr-status" onchange="renderTrades()">
      <option value="">All status</option>
      <option value="OPEN">OPEN</option>
      <option value="CLOSED">CLOSED</option>
    </select>
    <select id="tr-side" onchange="renderTrades()">
      <option value="">All sides</option>
      <option value="BUY">BUY</option>
      <option value="SELL">SELL</option>
    </select>
    <div class="limit-wrap">
      <label>Limit</label>
      <select id="tr-limit" onchange="loadTrades()">
        <option value="50">50</option><option value="100">100</option><option value="200">200</option>
      </select>
    </div>
  </div>
  <div id="trades-table"><div class="loader">Loading…</div></div>
</div>

<!-- AUDIT -->
<div class="panel" id="panel-audit">
  <div class="toolbar">
    <input id="au-search" type="text" placeholder="Filter event…" oninput="renderAudit()" />
    <div class="limit-wrap">
      <label>Limit</label>
      <select id="au-limit" onchange="loadAudit()">
        <option value="50">50</option><option value="100">100</option><option value="200">200</option>
      </select>
    </div>
  </div>
  <div id="audit-table"><div class="loader">Loading…</div></div>
</div>

<!-- Lifecycle drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer(event)">
  <div class="drawer" id="lifecycleDrawer">
    <div class="drawer-header">
      <h2 id="drawerTitle">Trade Lifecycle</h2>
      <button class="drawer-close" onclick="closeDrawer()">&#x2715;</button>
    </div>
    <div class="drawer-body" id="drawerBody">
      <div class="loader">Loading…</div>
    </div>
  </div>
</div>

<!-- JSON modal -->
<div class="modal-overlay" id="jsonModal">
  <div class="modal">
    <h3 id="modalTitle">JSON Data</h3>
    <pre id="modalBody"></pre>
    <button class="modal-close" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
  const API = '';  // same origin — FastAPI on port 8000

  let sigData = [], trData = [], auData = [];

  // Safe payload store — avoids embedding JSON in onclick attributes
  const _jsonStore = new Map();
  let _jsonStoreKey = 0;
  function _storeJson(value) {
    const key = ++_jsonStoreKey;
    _jsonStore.set(key, value);
    return key;
  }

  // ── Tab switching ──────────────────────────────────────────────────────────
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['signals','trades','audit'][i] === name);
    });
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
  }

  // ── Fetch helpers ──────────────────────────────────────────────────────────
  async function apiFetch(path) {
    const r = await fetch(API + path);
    if (!r.ok) throw new Error(r.statusText);
    const j = await r.json();
    return j.result;
  }

  async function loadSignals() {
    const limit = document.getElementById('sig-limit').value;
    try {
      const res = await apiFetch(`/signals?limit=${limit}`);
      sigData = res.signals || [];
      renderSignals();
      document.getElementById('s-total').textContent = res.count ?? sigData.length;
    } catch(e) { document.getElementById('signals-table').innerHTML = err(e); }
  }

  async function loadTrades() {
    const limit = document.getElementById('tr-limit').value;
    try {
      const res = await apiFetch(`/trades?limit=${limit}`);
      trData = res.trades || [];
      renderTrades();
      const open = trData.filter(t => t.status === 'OPEN').length;
      const pnl  = trData.filter(t => t.status === 'CLOSED').reduce((s, t) => s + (t.pnl || 0), 0);
      document.getElementById('t-total').textContent = res.count ?? trData.length;
      document.getElementById('t-open').textContent  = open;
      document.getElementById('t-pnl').textContent   = pnl >= 0 ? '+' + pnl.toFixed(2) : pnl.toFixed(2);
      document.getElementById('t-pnl').className     = 'value ' + (pnl > 0 ? 'pnl-pos' : pnl < 0 ? 'pnl-neg' : 'pnl-zero');
    } catch(e) { document.getElementById('trades-table').innerHTML = err(e); }
  }

  async function loadAudit() {
    const limit = document.getElementById('au-limit').value;
    try {
      const res = await apiFetch(`/logs?limit=${limit}`);
      auData = res.logs || [];
      renderAudit();
      document.getElementById('a-total').textContent = res.count ?? auData.length;
    } catch(e) { document.getElementById('audit-table').innerHTML = err(e); }
  }

  async function checkHealth() {
    try {
      const r = await fetch(API + '/health');
      const ok = r.ok;
      document.getElementById('statusDot').style.background = ok ? 'var(--green)' : 'var(--red)';
      document.getElementById('statusDot').style.boxShadow  = ok ? '0 0 6px var(--green)' : '0 0 6px var(--red)';
      document.getElementById('statusTxt').textContent = ok ? 'API online' : 'API offline';
    } catch {
      document.getElementById('statusDot').style.background = 'var(--red)';
      document.getElementById('statusTxt').textContent = 'API unreachable';
    }
  }

  function refreshAll() { checkHealth(); loadSignals(); loadTrades(); loadAudit(); }

  // ── Render helpers ─────────────────────────────────────────────────────────
  function err(e) { return `<div class="empty-state"><div class="icon">⚠</div>${e.message}</div>`; }

  function sideBadge(s) {
    if (!s) return '<span class="muted">—</span>';
    const cls = s === 'BUY' ? 'badge-buy' : 'badge-sell';
    return `<span class="badge ${cls}">${s}</span>`;
  }
  function statusBadge(s) {
    const cls = s === 'OPEN' ? 'badge-open' : 'badge-closed';
    return `<span class="badge ${cls}">${s}</span>`;
  }
  function aiBadge(approved, source) {
    if (source === 'disabled') return `<span class="badge badge-disabled">disabled</span>`;
    return approved
      ? `<span class="badge badge-yes">yes</span>`
      : `<span class="badge badge-no">no</span>`;
  }
  function pnlCell(v) {
    if (v == null) return '<span class="muted">—</span>';
    const cls = v > 0 ? 'pnl-pos' : v < 0 ? 'pnl-neg' : 'pnl-zero';
    const prefix = v > 0 ? '+' : '';
    return `<span class="${cls}">${prefix}${Number(v).toFixed(2)}</span>`;
  }
  function confBar(v) {
    const pct = Math.round((v || 0) * 100);
    return `<div class="conf-bar-wrap"><div class="conf-bar"><div class="conf-bar-fill" style="width:${pct}%"></div></div><span class="mono muted">${pct}%</span></div>`;
  }
  function dt(s) {
    if (!s) return '<span class="muted">—</span>';
    return `<span class="mono muted">${s.replace('T',' ').split('.')[0]}</span>`;
  }
  function jsonCell(raw, title) {
    if (!raw) return '<span class="muted">—</span>';
    const parsed = typeof raw === 'string' ? (() => { try { return JSON.parse(raw); } catch { return raw; } })() : raw;
    const pretty = JSON.stringify(parsed, null, 2);
    const preview = pretty.replace(/\s+/g, ' ').substring(0, 60);
    const key = _storeJson({ title, pretty });
    return `<span class="json-cell mono" onclick="showJsonKey(${key})">${preview}${pretty.length > 60 ? '…' : ''}</span>`;
  }

  function filterData(arr, search, extraFn) {
    const q = search.toLowerCase();
    return arr.filter(r => {
      const matchQ = !q || JSON.stringify(r).toLowerCase().includes(q);
      return matchQ && (!extraFn || extraFn(r));
    });
  }

  // ── Signals table ──────────────────────────────────────────────────────────
  function renderSignals() {
    const q = document.getElementById('sig-search').value;
    const side = document.getElementById('sig-side').value;
    const ai   = document.getElementById('sig-ai').value;
    const rows = filterData(sigData, q, r =>
      (!side || r.side === side) &&
      (ai === '' || String(r.ai_approved ? 1 : 0) === ai)
    );
    if (!rows.length) { document.getElementById('signals-table').innerHTML = empty(); return; }
    document.getElementById('signals-table').innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>#</th><th>Time</th><th>Symbol</th><th>Strategy</th>
            <th>Side</th><th>Confidence</th><th>AI</th><th>AI Reasoning</th><th>Context</th>
          </tr></thead>
          <tbody>
            ${rows.map(r => `<tr>
              <td class="mono muted">${r.id}</td>
              <td>${dt(r.created_at)}</td>
              <td><strong>${r.symbol}</strong></td>
              <td class="muted">${r.strategy}</td>
              <td>${sideBadge(r.side)}</td>
              <td>${confBar(r.ai_confidence ?? r.confidence)}</td>
              <td>${aiBadge(r.ai_approved, r.ai_source)}</td>
              <td class="muted" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.ai_reasoning || '—'}</td>
              <td>${jsonCell(r.context, 'Signal Context')}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  // ── Trades table ───────────────────────────────────────────────────────────
  function renderTrades() {
    const q      = document.getElementById('tr-search').value;
    const status = document.getElementById('tr-status').value;
    const side   = document.getElementById('tr-side').value;
    const rows = filterData(trData, q, r =>
      (!status || r.status === status) && (!side || r.side === side)
    );
    if (!rows.length) { document.getElementById('trades-table').innerHTML = empty(); return; }
    document.getElementById('trades-table').innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th></th><th>#</th><th>Opened</th><th>Symbol</th>
            <th>Strategy</th><th>Side</th><th>Qty</th>
            <th>Entry</th><th>Exit</th><th>PnL</th><th>Status</th><th>Reason</th>
          </tr></thead>
          <tbody>
            ${rows.map(r => `<tr>
              <td><button class="view-btn" onclick="openLifecycle(${r.id})">View</button></td>
              <td class="mono muted">${r.id}</td>
              <td>${dt(r.opened_at)}</td>
              <td><strong>${r.symbol}</strong></td>
              <td class="muted">${r.strategy || '—'}</td>
              <td>${sideBadge(r.side)}</td>
              <td class="mono">${r.qty}</td>
              <td class="mono">${r.entry_price != null ? r.entry_price : '—'}</td>
              <td class="mono">${r.exit_price  != null ? r.exit_price  : '—'}</td>
              <td>${pnlCell(r.pnl)}</td>
              <td>${statusBadge(r.status)}</td>
              <td class="muted" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.trade_reason || '<span style="color:var(--border)">—</span>'}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  // ── Audit table ────────────────────────────────────────────────────────────
  function renderAudit() {
    const q = document.getElementById('au-search').value;
    const rows = filterData(auData, q);
    if (!rows.length) { document.getElementById('audit-table').innerHTML = empty(); return; }
    document.getElementById('audit-table').innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>#</th><th>Time</th><th>Event</th><th>Payload</th>
          </tr></thead>
          <tbody>
            ${rows.map(r => `<tr>
              <td class="mono muted">${r.id}</td>
              <td>${dt(r.at)}</td>
              <td><span class="badge badge-open">${r.event}</span></td>
              <td>${jsonCell(r.payload, 'Audit Payload')}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  function empty() {
    return `<div class="empty-state"><div class="icon">○</div>No records match your filter.</div>`;
  }

  // ── JSON modal ─────────────────────────────────────────────────────────────
  function showJsonKey(key) {
    const entry = _jsonStore.get(key);
    if (!entry) return;
    document.getElementById('modalTitle').textContent = entry.title;
    document.getElementById('modalBody').textContent  = entry.pretty;
    document.getElementById('jsonModal').classList.add('open');
  }
  function closeModal() { document.getElementById('jsonModal').classList.remove('open'); }
  document.getElementById('jsonModal').addEventListener('click', e => {
    if (e.target === document.getElementById('jsonModal')) closeModal();
  });

  // ── Lifecycle drawer ───────────────────────────────────────────────────────
  let _currentTradeId = null;

  async function openLifecycle(tradeId) {
    _currentTradeId = tradeId;
    document.getElementById('drawerTitle').textContent = `Trade #${tradeId}`;
    document.getElementById('drawerBody').innerHTML = '<div class="loader">Loading…</div>';
    document.getElementById('drawerOverlay').classList.add('open');

    try {
      const res = await apiFetch(`/trades/${tradeId}/lifecycle`);
      renderDrawer(res);
    } catch(e) {
      document.getElementById('drawerBody').innerHTML = `<div class="empty-state"><div class="icon">⚠</div>${e.message}</div>`;
    }
  }

  function renderDrawer(data) {
    const t  = data.trade;
    const au = data.audit_trail || [];

    const pnlColor = t.pnl > 0 ? 'var(--green)' : t.pnl < 0 ? 'var(--red)' : 'var(--muted)';
    const pnlText  = t.pnl != null ? (t.pnl >= 0 ? '+' : '') + Number(t.pnl).toFixed(2) : '—';

    // entry_context key-value pairs
    const ctx = t.entry_context || {};
    const ctxRows = Object.entries(ctx).map(([k, v]) =>
      `<div class="dl-item"><span class="dl-label">${k}</span><span class="dl-value mono">${typeof v === 'number' ? v.toFixed(4) : v}</span></div>`
    ).join('');

    // timeline
    const tlHtml = au.length === 0
      ? '<p class="muted" style="font-size:13px">No audit events found for this trade.</p>'
      : `<div class="timeline">${au.map((e, i) => `
          <div class="tl-item">
            <div class="tl-dot-wrap">
              <div class="tl-dot"></div>
              ${i < au.length - 1 ? '<div class="tl-line"></div>' : ''}
            </div>
            <div class="tl-content">
              <div class="tl-event">${e.event}</div>
              <div class="tl-time">${e.at ? e.at.replace('T',' ').split('.')[0] : '—'}</div>
              <div class="tl-payload">${JSON.stringify(e.payload, null, 2)}</div>
            </div>
          </div>`).join('')}</div>`;

    document.getElementById('drawerTitle').innerHTML =
      `Trade #${t.id} &nbsp; ${sideBadge(t.side)} &nbsp; ${statusBadge(t.status)}`;

    document.getElementById('drawerBody').innerHTML = `
      <!-- Overview -->
      <div class="dl-section">
        <div class="dl-section-title">Trade Details</div>
        <div class="dl-grid">
          <div class="dl-item"><span class="dl-label">Symbol</span><span class="dl-value"><strong>${t.symbol}</strong></span></div>
          <div class="dl-item"><span class="dl-label">Strategy</span><span class="dl-value">${t.strategy || '—'}</span></div>
          <div class="dl-item"><span class="dl-label">Qty</span><span class="dl-value mono">${t.qty}</span></div>
          <div class="dl-item"><span class="dl-label">Mode</span><span class="dl-value muted">${t.mode}</span></div>
          <div class="dl-item"><span class="dl-label">Entry Price</span><span class="dl-value mono">${t.entry_price}</span></div>
          <div class="dl-item"><span class="dl-label">Exit Price</span><span class="dl-value mono">${t.exit_price ?? '—'}</span></div>
          <div class="dl-item"><span class="dl-label">Stop Loss</span><span class="dl-value mono" style="color:var(--red)">${t.stop_loss}</span></div>
          <div class="dl-item"><span class="dl-label">Target</span><span class="dl-value mono" style="color:var(--green)">${t.target ?? '—'}</span></div>
          <div class="dl-item"><span class="dl-label">PnL</span><span class="dl-value" style="font-weight:700;color:${pnlColor}">${pnlText}</span></div>
          <div class="dl-item"><span class="dl-label">Broker Order</span><span class="dl-value mono muted">${t.broker_order_id || '—'}</span></div>
          <div class="dl-item"><span class="dl-label">Opened</span><span class="dl-value mono muted">${t.opened_at ? t.opened_at.replace('T',' ').split('.')[0] : '—'}</span></div>
          <div class="dl-item"><span class="dl-label">Closed</span><span class="dl-value mono muted">${t.closed_at ? t.closed_at.replace('T',' ').split('.')[0] : '—'}</span></div>
        </div>
      </div>

      ${Object.keys(ctx).length > 0 ? `
      <!-- Entry indicators -->
      <div class="dl-section">
        <div class="dl-section-title">Entry Indicators</div>
        <div class="dl-grid">${ctxRows}</div>
      </div>` : ''}

      <!-- Strategy / Reason -->
      <div class="dl-section">
        <div class="dl-section-title">Why this trade was taken</div>
        <textarea id="reasonInput" class="reason-textarea" placeholder="Describe the setup, catalyst, or strategy rationale…">${t.trade_reason || ''}</textarea>
        <div style="display:flex;align-items:center;gap:12px;margin-top:6px">
          <button class="reason-save-btn" onclick="saveReason(${t.id})">Save</button>
          <span class="reason-saved-msg" id="savedMsg">Saved!</span>
        </div>
      </div>

      <!-- Audit timeline -->
      <div class="dl-section">
        <div class="dl-section-title">Audit Timeline</div>
        ${tlHtml}
      </div>`;
  }

  async function saveReason(tradeId) {
    const reason = document.getElementById('reasonInput').value.trim() || null;
    try {
      await fetch(`${API}/trades/${tradeId}/reason`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ reason }),
      });
      // Update in-memory cache so table shows updated reason without full reload
      const tr = trData.find(t => t.id === tradeId);
      if (tr) { tr.trade_reason = reason; renderTrades(); }
      const msg = document.getElementById('savedMsg');
      msg.style.display = 'inline';
      setTimeout(() => { msg.style.display = 'none'; }, 2000);
    } catch(e) { alert('Save failed: ' + e.message); }
  }

  function closeDrawer(e) {
    if (e && e.target !== document.getElementById('drawerOverlay')) return;
    document.getElementById('drawerOverlay').classList.remove('open');
    _currentTradeId = null;
  }

  // ── Boot ───────────────────────────────────────────────────────────────────
  refreshAll();
  setInterval(refreshAll, 30000);  // auto-refresh every 30 s
</script>
</body>
</html>
